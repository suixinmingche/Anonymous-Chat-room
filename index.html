<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>极简隐私聊天</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── 设计令牌 ── */
    :root {
      --bg:         #0d0d14;
      --surface:    #13131e;
      --surface2:   #1a1a28;
      --surface3:   #1f1f30;
      --border:     #252538;
      --border-dim: #1e1e2e;
      --text:       #e8e8f5;
      --text-dim:   #6b6b8a;
      --text-muted: #3d3d58;
      --accent:     #00e5ff;
      --accent2:    #c400ff;
      --accent-dim: #0099bb;
      --success:    #00e5a0;
      --glow:       0 0 24px rgba(0,229,255,.45);
      --glow2:      0 0 24px rgba(196,0,255,.45);
      --glow-sm:    0 0 12px rgba(0,229,255,.3);
      --radius-sm:  6px;
      --radius-md:  12px;
      --radius-lg:  20px;
      --transition: .2s cubic-bezier(.4,0,.2,1);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:         #f2f3f8;
        --surface:    #ffffff;
        --surface2:   #f7f8fc;
        --surface3:   #eef0f7;
        --border:     #e0e2ee;
        --border-dim: #eceff7;
        --text:       #18192b;
        --text-dim:   #7a7d9a;
        --text-muted: #b0b3cc;
        --accent:     #0099cc;
        --accent2:    #9900cc;
        --accent-dim: #0077aa;
        --success:    #00aa77;
        --glow:       0 0 16px rgba(0,153,204,.35);
        --glow2:      0 0 16px rgba(153,0,204,.25);
        --glow-sm:    0 0 10px rgba(0,153,204,.25);
      }
    }

    /* ── 基础 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 背景光晕 ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 60%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(0,229,255,.07) 0%, transparent 70%);
      animation: driftA 20s ease-in-out infinite alternate;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 60%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(196,0,255,.07) 0%, transparent 70%);
      animation: driftB 24s ease-in-out infinite alternate;
    }
    @keyframes driftA { from { transform: translate(0,0) scale(1); } to { transform: translate(5%,3%) scale(1.1); } }
    @keyframes driftB { from { transform: translate(0,0) scale(1); } to { transform: translate(-4%,-5%) scale(1.08); } }

    /* 网格 */
    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(var(--border-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-dim) 1px, transparent 1px);
      background-size: 56px 56px;
      opacity: .4;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    /* ── 主内容 ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 52px;
      position: relative;
      z-index: 1;
    }

    /* ── 徽标 ── */
    .logo-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: fadeUp .7s ease-out both;
    }
    .logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glow), var(--glow2);
      position: relative;
      flex-shrink: 0;
    }
    .logo-icon::before {
      content: '';
      position: absolute;
      inset: -3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 17px;
      z-index: -1;
      filter: blur(14px);
      opacity: .5;
    }
    .logo-icon svg { color: #000; }

    /* ── 标题区 ── */
    .hero {
      text-align: center;
      animation: fadeUp .7s ease-out .1s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }

    .hero-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent);
      text-shadow: var(--glow);
      text-transform: uppercase;
      margin-bottom: 14px;
      line-height: 1.15;
    }
    .hero-title span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-desc {
      font-size: .95rem;
      color: var(--text-dim);
      line-height: 1.9;
      max-width: 380px;
      margin: 0 auto 28px;
      letter-spacing: .3px;
    }

    .hero-tags {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tag {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: .72rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: 1px;
      font-family: 'JetBrains Mono', monospace;
      transition: all var(--transition);
      cursor: default;
    }
    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--glow-sm);
      transform: translateY(-1px);
    }
    .tag-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: var(--glow-sm);
      flex-shrink: 0;
    }

    /* ── 操作卡 ── */
    .action {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px 28px;
      animation: fadeUp .7s ease-out .2s both;
      position: relative;
      overflow: hidden;
    }
    .action::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: .6;
    }
    /* 卡片内部光晕 */
    .action::after {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 120px;
      background: radial-gradient(ellipse, rgba(0,229,255,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .action-label {
      font-size: .68rem;
      color: var(--text-muted);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      margin-bottom: 22px;
    }

    /* 随机按钮 */
    .btn-random {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      border: none;
      padding: 15px 24px;
      border-radius: var(--radius-md);
      font-size: .95rem;
      font-weight: 700;
      font-family: 'Inter', system-ui, sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform var(--transition), box-shadow var(--transition), filter var(--transition);
      box-shadow: var(--glow), var(--glow2);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }
    .btn-random::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background var(--transition);
    }
    .btn-random:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,229,255,.5), 0 8px 32px rgba(196,0,255,.4);
      filter: brightness(1.05);
    }
    .btn-random:hover::before { background: rgba(255,255,255,.08); }
    .btn-random:active { transform: translateY(0) scale(.98); }

    /* 分割线 */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: .65rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    /* 输入行 */
    .custom-row { display: flex; gap: 8px; }

    .custom-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 13px 16px;
      border-radius: var(--radius-md);
      font-size: .9rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 3px;
      outline: none;
      transition: border var(--transition), box-shadow var(--transition), background var(--transition);
      min-width: 0;
    }
    .custom-input:focus {
      border-color: var(--accent);
      box-shadow: var(--glow-sm);
      background: var(--surface3);
    }
    .custom-input:focus::placeholder { opacity: .4; }
    .custom-input::placeholder { color: var(--text-muted); letter-spacing: 1px; }
    .custom-input.error {
      border-color: #ff3366;
      box-shadow: 0 0 14px rgba(255,51,102,.4);
      animation: shake .3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-4px); }
      75%      { transform: translateX(4px); }
    }

    .btn-go {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 13px 20px;
      border-radius: var(--radius-md);
      font-size: .82rem;
      font-weight: 600;
      font-family: 'Inter', system-ui, sans-serif;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    .btn-go:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      box-shadow: var(--glow-sm);
      transform: translateY(-1px);
    }
    .btn-go:active { transform: scale(.97); }

    .hint {
      font-size: .65rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 12px;
      letter-spacing: .5px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── 统计栏 ── */
    .stats {
      display: flex;
      gap: 24px;
      justify-content: center;
      animation: fadeUp .7s ease-out .35s both;
    }
    .stat-item {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .stat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: var(--glow-sm);
    }
    .stat-label {
      font-size: .62rem;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .stat-div {
      width: 1px;
      background: var(--border);
      align-self: stretch;
      margin: 4px 0;
    }

    /* ── 页脚 ── */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: .62rem;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      position: relative;
      z-index: 1;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── 响应式 ── */
    @media (max-width: 480px) {
      .hero-title { font-size: 2rem; letter-spacing: 2px; }
      .action { padding: 28px 20px 24px; border-radius: var(--radius-md); }
      .custom-row { flex-direction: column; }
      .btn-go { width: 100%; text-align: center; }
      .stats { gap: 16px; }
    }

    /* ── 功能切换 ── */
    .feature-tabs {
      display: flex;
      gap: 8px;
      animation: fadeUp .7s ease-out .15s both;
    }
    .feature-tab {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 10px 24px;
      border-radius: var(--radius-md);
      font-size: .85rem;
      font-weight: 600;
      font-family: 'Inter', system-ui, sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all var(--transition);
    }
    .feature-tab:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .feature-tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: #000;
      box-shadow: var(--glow);
    }
    .feature-tab.active:hover {
      transform: translateY(-1px);
    }

    /* ── 飘飘瓶样式 ── */
    .msg-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 16px;
      border-radius: var(--radius-md);
      font-size: .9rem;
      font-family: 'Inter', system-ui, sans-serif;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border var(--transition), box-shadow var(--transition);
      margin-bottom: 10px;
    }
    .msg-textarea:focus {
      border-color: var(--accent);
      box-shadow: var(--glow-sm);
    }
    .msg-textarea::placeholder { color: var(--text-muted); }

    .char-info {
      text-align: right;
      font-size: .7rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 14px;
    }

    .msg-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }
    .msg-option-item {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .msg-option-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .msg-option-label {
      font-size: .85rem;
      color: var(--text);
    }
    .delay-select {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 28px;
      font-size: .8rem;
      color: var(--text-dim);
    }
    .delay-select select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: .8rem;
      outline: none;
      cursor: pointer;
    }
    .delay-select select:focus {
      border-color: var(--accent);
    }
    .password-input {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 28px;
      font-size: .8rem;
      color: var(--text-dim);
    }
    .password-input input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: .8rem;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      width: 140px;
    }
    .password-input input:focus {
      border-color: var(--accent);
      box-shadow: var(--glow-sm);
    }
    .password-input input::placeholder { color: var(--text-muted); }
    .btn-create {
      width: 100%;
      background: linear-gradient(135deg, #00e5a0, #00cc88);
      color: #000;
      border: none;
      padding: 14px 24px;
      border-radius: var(--radius-md);
      font-size: .95rem;
      font-weight: 700;
      font-family: 'Inter', system-ui, sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all var(--transition);
      box-shadow: 0 0 20px rgba(0,229,160,.35);
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }
    .btn-create:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,229,160,.45);
      filter: brightness(1.05);
    }
    .btn-create:active {
      transform: scale(.98);
    }
    .msg-tip {
      text-align: center;
      font-size: .62rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-size: .85rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      opacity: 0;
      transition: all .3s ease;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error {
      border-color: #ff3366;
      color: #ff3366;
    }
    .toast.success {
      border-color: var(--success);
      color: var(--success);
    }

    /* 隐藏类 */
    .hidden { display: none !important; }

    /* ── 分享弹窗 ── */
    .share-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      transition: opacity .3s ease;
      backdrop-filter: blur(4px);
    }
    .share-modal.show {
      opacity: 1;
    }
    .share-modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .share-modal-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }
    .share-modal-tip {
      font-size: .85rem;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .share-link-box input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: .8rem;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      outline: none;
    }
    .share-link-box input:focus {
      border-color: var(--accent);
    }
    .share-modal-btn {
      width: 100%;
      background: linear-gradient(135deg, #00e5a0, #00cc88);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
    }
    .share-modal-close {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 10px 24px;
      border-radius: var(--radius-md);
      font-size: .8rem;
      cursor: pointer;
      margin-top: 10px;
    }
    .share-modal-close:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-grid"></div>

  <div class="main">

    <!-- 标题区 -->
    <div class="hero">
      <div class="logo-mark" style="justify-content:center; margin-bottom:24px;">
        <div class="logo-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>
      <h1 class="hero-title"><span>极简隐私聊天</span></h1>
      <p class="hero-desc">
        临时私密对话，阅后即焚<br/>
        无注册 · 无记录 · 完全匿名
      </p>
      <div class="hero-tags">
        <div class="tag"><span class="tag-dot"></span>无数据库</div>
        <div class="tag"><span class="tag-dot"></span>无记录</div>
        <div class="tag"><span class="tag-dot"></span>阅后即焚</div>
        <div class="tag"><span class="tag-dot"></span>完全匿名</div>
      </div>
    </div>

    <!-- 功能选择区 -->
    <div class="feature-tabs">
      <button class="feature-tab active" onclick="switchTab('chat')" id="tabChat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        匿名聊天
      </button>
      <button class="feature-tab" onclick="switchTab('msg')" id="tabMsg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
        </svg>
        飘飘瓶
      </button>
    </div>

    <!-- 操作卡 - 聊天室 -->
    <div class="action" id="panelChat">
      <div class="action-label">创建或加入房间</div>

      <button class="btn-random" id="btnRandom" onclick="goRandom()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        随机进入房间
      </button>

      <div class="divider"><span>或者输入房间号</span></div>

      <div class="custom-row">
        <input
          type="text"
          class="custom-input"
          id="roomInput"
          placeholder="4-8位字母或数字"
          maxlength="8"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn-go" onclick="goCustom()">进入</button>
      </div>

      <div class="hint">房间号支持 4-8 位字母或数字</div>
    </div>

    <!-- 操作卡 - 飘飘瓶 -->
    <div class="action hidden" id="panelMsg">
      <div class="action-label">🍶 创建匿名留言</div>

      <textarea
        class="msg-textarea"
        id="msgInput"
        placeholder="写下你想说的话…&#10;&#10;支持文字，匿名发送，无需注册。"
        maxlength="5000"
      ></textarea>

      <div class="char-info">
        <span id="charCount">0</span> / 5000
      </div>

      <div class="msg-options">
        <label class="msg-option-item">
          <input type="checkbox" id="selfDestruct" />
          <span class="msg-option-label">💀 阅后即焚</span>
        </label>
        <div id="delaySelect" class="delay-select hidden">
          <span>查看后</span>
          <select id="destroyDelay">
            <option value="10">10秒</option>
            <option value="30">30秒</option>
            <option value="60">60秒</option>
            <option value="300">5分钟</option>
          </select>
          <span>销毁</span>
        </div>
        <label class="msg-option-item">
          <input type="checkbox" id="usePassword" />
          <span class="msg-option-label">🔐 口令保护</span>
        </label>
        <div id="passwordInput" class="password-input hidden">
          <input type="password" id="msgPassword" placeholder="设置6位口令" maxlength="20" />
        </div>
      </div>

      <button class="btn-create" id="btnCreate" onclick="createMessage()">
        <span class="btn-icon">🚀</span> 创建留言
      </button>

      <div class="msg-tip">留言默认 24 小时后自动销毁 · 完全匿名 · 无需登录</div>
    </div>

    <!-- 统计栏 -->
    <div class="stats">
      <div class="stat-item">
        <div class="stat-num">0</div>
        <div class="stat-label">数据库</div>
      </div>
      <div class="stat-div"></div>
      <div class="stat-item">
        <div class="stat-num">0ms</div>
        <div class="stat-label">存留记录</div>
      </div>
      <div class="stat-div"></div>
      <div class="stat-item">
        <div class="stat-num">∞</div>
        <div class="stat-label">隐私保障</div>
      </div>
    </div>

  </div>

  <div class="footer">
    &copy; 2026 随心名彻 &nbsp;·&nbsp; 极简隐私聊天
  </div>

  <script>
    // ── Tab 切换 ──
    let currentTab = 'chat';

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabChat').classList.toggle('active', tab === 'chat');
      document.getElementById('tabMsg').classList.toggle('active', tab === 'msg');
      document.getElementById('panelChat').classList.toggle('hidden', tab !== 'chat');
      document.getElementById('panelMsg').classList.toggle('hidden', tab !== 'msg');
    }

    // ── 聊天室 ──
    function genRoomCode() {
      const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
      return Array.from({length: 6}, () =>
        chars[Math.floor(Math.random() * chars.length)]
      ).join('');
    }

    function isValidRoom(code) {
      return /^[a-z0-9]{4,8}$/i.test(code);
    }

    function goRandom() {
      const btn = document.getElementById('btnRandom');
      btn.style.opacity = '.7';
      btn.style.transform = 'scale(.98)';
      setTimeout(() => {
        location.href = '/' + genRoomCode();
      }, 120);
    }

    function goCustom() {
      const input = document.getElementById('roomInput');
      const code = input.value.trim().toLowerCase();

      if (!code) { input.focus(); return; }

      if (!isValidRoom(code)) {
        input.classList.add('error');
        setTimeout(() => input.classList.remove('error'), 600);
        input.focus();
        return;
      }

      location.href = '/' + code;
    }

    document.getElementById('roomInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') goCustom();
    });

    document.getElementById('roomInput').addEventListener('input', function() {
      this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
    });

    // ── 飘飘瓶 ──
    const msgInput = document.getElementById('msgInput');
    const charCount = document.getElementById('charCount');
    const selfDestruct = document.getElementById('selfDestruct');
    const delaySelect = document.getElementById('delaySelect');
    const usePassword = document.getElementById('usePassword');
    const passwordInput = document.getElementById('passwordInput');
    const msgPassword = document.getElementById('msgPassword');

    msgInput.addEventListener('input', function() {
      charCount.textContent = this.value.length;
    });

    selfDestruct.addEventListener('change', function() {
      delaySelect.classList.toggle('hidden', !this.checked);
    });

    usePassword.addEventListener('change', function() {
      passwordInput.classList.toggle('hidden', !this.checked);
      if (this.checked) msgPassword.focus();
    });

    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast') || createToast();
      toast.textContent = msg;
      toast.className = 'toast ' + type;
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function createToast() {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.id = 'toast';
      document.body.appendChild(toast);
      return toast;
    }

    async function createMessage() {
      const content = msgInput.value.trim();
      if (!content) {
        showToast('请输入留言内容', 'error');
        msgInput.focus();
        return;
      }

      const password = usePassword.checked ? msgPassword.value.trim() : '';
      if (usePassword.checked && password.length < 4) {
        showToast('口令至少4位', 'error');
        msgPassword.focus();
        return;
      }

      const btn = document.getElementById('btnCreate');
      btn.disabled = true;
      btn.textContent = '创建中...';

      try {
        const res = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content,
            self_destruct: selfDestruct.checked,
            destruction_delay: parseInt(document.getElementById('destroyDelay').value),
            password: password || null
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || '创建失败');
        }

        const shareLink = location.origin + '/msg/' + data.id;

        // 复制链接（兼容穿透环境）
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(shareLink);
            showToast('留言已创建，链接已复制！', 'success');
          } else {
            // 穿透环境下显示链接让用户手动复制
            showShareModal(shareLink, data.id);
            return;
          }
        } catch (e) {
          // clipboard 失败也显示链接
          showShareModal(shareLink, data.id);
          return;
        }

        // 跳转到查看页
        setTimeout(() => {
          location.href = '/msg/' + data.id;
        }, 1000);

      } catch (e) {
        showToast(e.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-icon">🚀</span> 创建留言';
      }
    }

    // 显示分享弹窗（穿透环境备选）
    function showShareModal(link, msgId) {
      const modal = document.createElement('div');
      modal.className = 'share-modal';
      modal.innerHTML = `
        <div class="share-modal-content">
          <div class="share-modal-title">🍶 留言已创建！</div>
          <div class="share-modal-tip">请复制下方链接分享给朋友：</div>
          <div class="share-link-box">
            <input type="text" value="${link}" readonly onclick="this.select()" />
          </div>
          <button class="share-modal-btn" onclick="location.href='/msg/${msgId}'">查看我的留言</button>
          <button class="share-modal-close" onclick="this.closest('.share-modal').remove()">关闭</button>
        </div>
      `;
      document.body.appendChild(modal);
      setTimeout(() => modal.classList.add('show'), 10);
    }
  </script>
</body>
</html>
